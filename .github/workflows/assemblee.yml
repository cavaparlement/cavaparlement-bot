name: CavaAssemblee

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python -m bots.assemblee.main
        env:
          BLUESKY_ASSEMBLEE_IDENTIFIER: ${{ secrets.BLUESKY_ASSEMBLEE_IDENTIFIER }}
          BLUESKY_ASSEMBLEE_PASSWORD: ${{ secrets.BLUESKY_ASSEMBLEE_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - run: python scripts/update_photos.py

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/assemblee/ data/photos/assemblee/
          git diff --cached --quiet || (git commit -m "chore(assemblee): update data [skip ci]" && git pull --rebase && git push)

      - name: Trigger Vercel redeploy
        run: curl -s -X POST "https://api.vercel.com/v1/integrations/deploy/prj_3CtAIr5AZJyK3A3mOolVd005y22K/ZBCNbJNAM9"
