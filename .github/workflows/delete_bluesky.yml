name: Delete Bluesky Posts Today

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install atproto

      - run: python scripts/delete_bluesky_posts_today.py
        env:
          BLUESKY_ASSEMBLEE_IDENTIFIER: ${{ secrets.BLUESKY_ASSEMBLEE_IDENTIFIER }}
          BLUESKY_ASSEMBLEE_PASSWORD: ${{ secrets.BLUESKY_ASSEMBLEE_PASSWORD }}
