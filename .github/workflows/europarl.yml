name: CavaEuroparl

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python -m bots.europarl.bot
        env:
          BLUESKY_EUROPARL_IDENTIFIER: ${{ secrets.BLUESKY_EUROPARL_IDENTIFIER }}
          BLUESKY_EUROPARL_PASSWORD: ${{ secrets.BLUESKY_EUROPARL_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - run: |
          if git diff --quiet data/europarl/; then
            echo "Aucun changement de data, photos ignorées"
          else
            python scripts/update_photos.py
          fi

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/europarl/ data/photos/europarl/
          git diff --cached --quiet || git commit -m "chore(europarl): update data [skip ci]"
          git pull --rebase --autostash origin main
          git push
