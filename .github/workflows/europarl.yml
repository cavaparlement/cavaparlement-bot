name: CavaEuroparl

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python -m bots.europarl.bot
        env:
          BLUESKY_EUROPARL_IDENTIFIER: ${{ secrets.BLUESKY_EUROPARL_IDENTIFIER }}
          BLUESKY_EUROPARL_PASSWORD: ${{ secrets.BLUESKY_EUROPARL_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - run: python scripts/update_photos.py

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/europarl/ data/photos/europarl/
          git diff --cached --quiet || git commit -m "chore(europarl): update data [skip ci]"
          git push

      - name: Trigger Vercel redeploy
        run: curl -s -X POST "https://api.vercel.com/v1/integrations/deploy/prj_3CtAIr5AZJyK3A3mOolVd005y22K/ZBCNbJNAM9"
