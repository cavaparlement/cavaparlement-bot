name: CavaSenat
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m bots.senat.main
        env:
          BLUESKY_SENAT_IDENTIFIER: ${{ secrets.BLUESKY_SENAT_IDENTIFIER }}
          BLUESKY_SENAT_PASSWORD: ${{ secrets.BLUESKY_SENAT_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      - run: python scripts/update_photos.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/photos/senat/ data/senat/compteur_ras.json data/senat/senateurs_info.json
          git diff --cached --quiet || (git commit -m "chore(senat): update [skip ci]" && git pull --rebase && git push)
      - name: Trigger Vercel redeploy
        run: curl -s -X POST "https://api.vercel.com/v1/integrations/deploy/prj_3CtAIr5AZJyK3A3mOolVd005y22K/ZBCNbJNAM9"

